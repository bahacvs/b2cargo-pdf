name: Windows EXE Derle
# Rebuild marker: 2026-07-02 yeni-ayir-akisi

# Teknik olmayan kullanici icin tek dosya .exe uretir.
# Tetik: bu dosya main'e her yazildiginda calisir ve KODU feature branch'ten
# checkout edip derler (kaynak main'e merge edilmez). Yeniden derlemek icin
# bu dosyada kucuk bir degisiklik yapip main'e yazmak yeterli.
# Surum notu: B2Cargo tasarim sistemi arayuzu (CustomTkinter) + gomulu
# Manrope/JetBrains Mono fontlari + acik/koyu tema + iki logo.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-windows.yml"

# Release adimi vb. icin yazma izni
permissions:
  contents: write

env:
  SOURCE_REF: claude/test-coverage-analysis-ngrkaq

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodu al (feature branch)
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_REF }}

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bagimliliklar + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e .[build,test]

      - name: Testleri calistir
        run: python -m pytest

      - name: EXE derle
        run: >
          pyinstaller --onefile --windowed
          --name PerfettiVardiyaAyirma
          --icon assets/app.ico
          --collect-all customtkinter
          --add-data "config/regions.yaml;config"
          --add-data "config/dsv_lokasyonlar.yaml;config"
          --add-data "assets/app.ico;assets"
          --add-data "assets/fonts;assets/fonts"
          --add-data "assets/logo-mark.png;assets"
          --add-data "assets/logo-wordmark.png;assets"
          launch_gui.py

      - name: Dagitim klasoru hazirla
        shell: pwsh
        run: |
          $dist = "PerfettiVardiyaAyirma"
          New-Item -ItemType Directory -Force -Path "$dist/config" | Out-Null
          New-Item -ItemType Directory -Force -Path "$dist/Gelen_PDF" | Out-Null
          Copy-Item "dist/PerfettiVardiyaAyirma.exe" "$dist/" -Force
          Copy-Item "config/regions.yaml" "$dist/config/" -Force
          Copy-Item "config/dsv_lokasyonlar.yaml" "$dist/config/" -Force
          New-Item -ItemType File -Force -Path "$dist/Gelen_PDF/.gitkeep" | Out-Null
          @"
          PERFETTI VARDIYA AYIRMA - KULLANIM

          1) Vardiya irsaliye PDF'lerinin HEPSINI 'Gelen_PDF' klasorune kopyalayin.
          2) 'PerfettiVardiyaAyirma.exe' dosyasina cift tiklayin.
          3) Pencerede 'AYIR' butonuna basin. Sag ustteki anahtarla acik/koyu tema.

          CIKTI: 'Birlesik_PDF/<vardiya>' altinda iki ana klasor olusur:
            - DSV : teslimat yeri DSV listesindeki evraklar (duz, tek klasor).
            - B2  : geri kalan evraklar; once 'Bolge (N evrak, X kg)' (Adana, Ankara...),
                    her bolge icinde Palet (Toplam Koli >= 9) ve Dökme (<= 8).
          Irsaliyeler '{Alici} - {PVS}.pdf' adiyla ayri ayri durur. Pencereden
          'Cikti Klasorunu Ac' ile acabilirsiniz.

          DSV LISTESI: 'config\dsv_lokasyonlar.yaml'. 'iller:' altindakiler komple
          DSV (Istanbul). 'noktalar:' altinda diger illerde ilce + alici adi
          birlikte eslesince DSV. Programi yeniden derlemeye gerek yoktur.

          BOLGE LISTESI: 'config\regions.yaml' bolge->il/ilce haritasidir. Bir
          evrak 'bolge bulunamadi' ile Hata'ya duserse, adresteki il/ilce adini
          dogru bolgenin altina ekleyin (yeniden derleme gerekmez).

          HATA: Bolgesi bulunamayan VEYA koli adedi okunamayan evraklar 'Hata'
          klasorune gider; icindeki 'Hata_raporu.csv' nedeni ve okunan adresi
          gosterir. Duzelttikten sonra penceredeki 'Hata Klasorunu Tekrar Tara'
          butonuna basin.
          "@ | Out-File -FilePath "$dist/KULLANIM.txt" -Encoding utf8

      - name: Zip'le
        shell: pwsh
        run: Compress-Archive -Path "PerfettiVardiyaAyirma/*" -DestinationPath "PerfettiVardiyaAyirma.zip" -Force

      - name: Artifact yukle
        uses: actions/upload-artifact@v4
        with:
          name: PerfettiVardiyaAyirma
          path: PerfettiVardiyaAyirma.zip

      - name: Release'e ekle (etiket push'unda)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PerfettiVardiyaAyirma.zip
