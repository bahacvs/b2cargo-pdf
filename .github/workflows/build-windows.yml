name: Windows EXE Derle

# Teknik olmayan kullanici icin tek dosya .exe uretir.
# Tetik: bu dosya main'e her yazildiginda calisir ve KODU feature branch'ten
# checkout edip derler (kaynak main'e merge edilmez). Yeniden derlemek icin
# bu dosyada kucuk bir degisiklik yapip main'e yazmak yeterli.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-windows.yml"

# Release adimi vb. icin yazma izni
permissions:
  contents: write

env:
  SOURCE_REF: claude/test-coverage-analysis-ngrkaq

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodu al (feature branch)
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_REF }}

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bagimliliklar + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e .[build]

      - name: EXE derle
        run: >
          pyinstaller --onefile --windowed
          --name PerfettiVardiyaAyirma
          --add-data "config/regions.yaml;config"
          launch_gui.py

      - name: Dagitim klasoru hazirla
        shell: pwsh
        run: |
          $dist = "PerfettiVardiyaAyirma"
          New-Item -ItemType Directory -Force -Path "$dist/config" | Out-Null
          New-Item -ItemType Directory -Force -Path "$dist/Gelen_PDF" | Out-Null
          Copy-Item "dist/PerfettiVardiyaAyirma.exe" "$dist/" -Force
          Copy-Item "config/regions.yaml" "$dist/config/" -Force
          New-Item -ItemType File -Force -Path "$dist/Gelen_PDF/.gitkeep" | Out-Null
          @"
          PERFETTI VARDIYA AYIRMA - KULLANIM

          1) Vardiya irsaliye PDF'lerinin HEPSINI 'Gelen_PDF' klasorune kopyalayin.
          2) 'PerfettiVardiyaAyirma.exe' dosyasina cift tiklayin.
          3) Pencerede 'AYIR' butonuna basin. Sonuc 'Birlesik_PDF' klasorunde olusur;
             pencereden 'Cikti Klasorunu Ac' ile acabilirsiniz.

          BOLGE LISTESI: 'config\regions.yaml' dosyasini Not Defteri ile acip
          duzenleyebilirsiniz (yeni il/ilce eklemek icin). Programi yeniden
          derlemeye gerek yoktur.
          "@ | Out-File -FilePath "$dist/KULLANIM.txt" -Encoding utf8

      - name: Zip'le
        shell: pwsh
        run: Compress-Archive -Path "PerfettiVardiyaAyirma/*" -DestinationPath "PerfettiVardiyaAyirma.zip" -Force

      - name: Artifact yukle
        uses: actions/upload-artifact@v4
        with:
          name: PerfettiVardiyaAyirma
          path: PerfettiVardiyaAyirma.zip

      - name: Release'e ekle (etiket push'unda)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PerfettiVardiyaAyirma.zip
